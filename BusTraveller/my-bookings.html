<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings</title>

  <script>
    if (!localStorage.getItem("user")) {
      window.location.href = "login.html";
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #1f2937;
    }

    .header {
      background: #d84e55;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }

    .top-bar {
      background: white;
      padding: 18px 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .top-left h2 {
      font-size: 26px;
      color: #111827;
      margin-bottom: 4px;
    }

    .top-left p {
      color: #6b7280;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      transition: 0.2s;
    }

    .primary-btn {
      background: #d84e55;
      color: white;
    }

    .primary-btn:hover {
      background: #bf3f46;
    }

    .secondary-btn {
      background: white;
      color: #d84e55;
      border: 1px solid #d84e55;
    }

    .secondary-btn:hover {
      background: #fff1f2;
    }

    .page-wrap {
      max-width: 1280px;
      margin: 30px auto;
      padding: 0 18px 40px;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #eef2f7;
    }

    .summary-card h3 {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .summary-card p {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
    }

    .preview-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

.preview-btn:hover {
  background: #1d4ed8;
}

.cancel-btn {
  background: #dc2626;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

.cancel-btn:hover {
  background: #b91c1c;
}

    .bookings-panel {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #eef2f7;
      overflow: hidden;
      padding-left: 20px;
    }

    .panel-header {
      padding: 22px 24px;
      border-bottom: 1px solid #eef2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .panel-header h3 {
      font-size: 24px;
      color: #111827;
    }

    .refund-box {
      margin-top: 20px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 18px;
      padding: 18px 20px;
    }

    .refund-box h3 {
      color: #9a3412;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .refund-box p {
      color: #7c2d12;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
    }

    thead {
      background: #f8fafc;
    }

    th, td {
      padding: 18px 16px;
      text-align: left;
      border-bottom: 1px solid #eef2f7;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: #475569;
      font-weight: 700;
    }

    td {
      color: #111827;
    }

    .route-pill {
      display: inline-block;
      background: #fff1f2;
      color: #d84e55;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
    }

    .seat-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .seat-pill {
      background: #eef2ff;
      color: #4338ca;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      text-transform: capitalize;
    }

    .status-confirmed {
      background: #dcfce7;
      color: #166534;
    }

    .status-cancelled {
      background: #fee2e2;
      color: #b91c1c;
    }

    .cancel-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      padding: 9px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    .cancel-btn:hover {
      background: #fecaca;
    }

    .cancel-btn.disabled {
      background: #e5e7eb;
      color: #6b7280;
      cursor: not-allowed;
    }

    .empty-state {
      padding: 50px 20px;
      text-align: center;
      color: #6b7280;
    }

    .empty-state h4 {
      font-size: 24px;
      color: #111827;
      margin-bottom: 10px;
    }

    @media (max-width: 900px) {
      .summary-cards {
        grid-template-columns: 1fr;
      }

      .top-bar {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="header">My Bookings</div>

  <div class="top-bar">
    <div class="top-left">
      <h2>Your Travel Dashboard</h2>
      <p id="userInfo">Manage all your booked trips in one place.</p>
    </div>

    <div class="top-actions">
      <button class="action-btn primary-btn" onclick="goToTrip()">Book Another Trip</button>
      <button class="action-btn secondary-btn" onclick="goToHome()">Back to Home</button>
    </div>
  </div>

  <div class="page-wrap">
    <div class="summary-cards">
      <div class="summary-card">
        <h3>Total Bookings</h3>
        <p id="totalBookings">0</p>
      </div>

      <div class="summary-card">
        <h3>Total Seats Booked</h3>
        <p id="totalSeats">0</p>
      </div>

      <div class="summary-card">
        <h3>Upcoming Trips</h3>
        <p id="upcomingTrips">0</p>
      </div>
    </div>

    <div class="bookings-panel">
      <div class="booking-history-card">
      <h2>Booking History</h2>

  <div class="table-wrapper">
    <table class="booking-table">
      <thead>
        <tr>
          <th>Route</th>
          <th>Date</th>
          <th>Seats</th>
          <th>Total</th>
          <th>Status</th>
          <th>Refund</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="bookingTableBody">
        <!-- bookings will come here -->
      </tbody>
    </table>
  </div>
</div>
    </div>
  </div>

  <script src="my-bookings.js"></script>
</body>
</html>
